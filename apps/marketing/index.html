<!doctype html>
<!-- Single global theme control: this `data-theme` is the one source of truth for
     every @ui-organized/react component's colours across the whole site. The
     inline script below settles it before first paint — to the visitor's stored
     choice, or their OS `prefers-color-scheme` by default. The `light` here is
     just the pre-script value. No component overrides it. -->
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Settle light/dark before first paint so the page never flashes the wrong
         mode: use the visitor's stored choice, else fall back to their OS
         `prefers-color-scheme` (matching ThemeProvider's default). The brand
         colour is applied by the app; this only needs to settle `data-theme`. -->
    <script>
      try {
        var t = JSON.parse(localStorage.getItem("ui-org-site-theme") || "null");
        var mode =
          t && (t.mode === "dark" || t.mode === "light")
            ? t.mode
            : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", mode);
      } catch (e) {}
    </script>
    <title>UI Organized — From pile to product</title>
    <meta
      name="description"
      content="An open source design system ecosystem: a web theme builder, a Figma plugin, and an npm component library — all driven by one theme config."
    />
    <!-- The UI Organized logomark (public/favicon.svg). It's an SVG icon with an
         embedded `prefers-color-scheme` rule, so the glyph paints ink on light
         browser chrome and cream on dark — matching the brand mark in the nav. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Fonts (Inter for UI/body, EB Garamond for brand display headings) are
         self-hosted via Fontsource and imported in src/styles/fonts.ts, not
         loaded from the Google Fonts CDN — so no visitor data reaches Google on
         page load. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
