<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 12px/1.5 -apple-system, system-ui, sans-serif; margin: 0; padding: 12px; color: #111; }
      h3 { margin: 0 0 4px; }
      p { margin: 0 0 8px; color: #555; }
      textarea { width: 100%; height: 160px; font-family: ui-monospace, monospace; font-size: 11px; box-sizing: border-box; }
      .row { display: flex; gap: 8px; margin: 8px 0; }
      button { padding: 6px 12px; cursor: pointer; }
      button:disabled { opacity: 0.5; cursor: default; }
      pre { background: #f5f5f5; padding: 8px; border-radius: 4px; white-space: pre-wrap; word-break: break-word; max-height: 180px; overflow: auto; }
    </style>
  </head>
  <body>
    <h3>UI Organized — Token Push</h3>
    <p>Paste a project document, build a plan, then apply. Orphans and publishing are surfaced, never automatic.</p>
    <textarea id="doc" placeholder="{ ...ProjectDocument JSON... }"></textarea>
    <div class="row">
      <button id="plan">Build plan</button>
      <button id="apply" disabled>Apply push</button>
    </div>
    <pre id="out">No plan yet.</pre>
    <!-- INLINE_SCRIPT -->
  </body>
</html>
