name: Deploy site to GitHub Pages

# Publishes the apps from one Pages deployment (a repo gets only one Pages
# site). The site is served from the custom domain uiorganized.com at the
# root, so each app's base path is root-relative (NOT prefixed with the repo
# name): the marketing site at the root — https://uiorganized.com/ — the
# builder tool under /builder/, and the white-labeled Storybook under
# /storybook/ (the nav's "Components" link). The marketing site reads the
# roadmap.json that roadmap-sync.yml commits, so a push to main here is the
# "static redeploy" that surfaces fresh board data.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the workspace deps the apps rely on (@ui-organized/react, @ui-organized/tokens,
      # @ui-organized/utils, …). `^...` selects each app's dependencies but not the apps.
      - name: Build workspace dependencies
        run: pnpm turbo build --filter=@ui-organized/marketing^... --filter=@ui-organized/builder^... --filter=@ui-organized/storybook^...

      # Run Vite directly rather than each package's `build` script, which also
      # runs `tsc --noEmit`. The apps have pre-existing type errors that would
      # block the deploy; Vite's esbuild bundling does not typecheck.

      # Marketing is the public site at the custom-domain root (uiorganized.com).
      - name: Build marketing (site root)
        env:
          BASE_PATH: /
          # GA4 Measurement ID. Set as a repo secret (Settings → Secrets and
          # variables → Actions). Unset → analytics is silently disabled.
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
        run: pnpm --filter @ui-organized/marketing exec vite build

      # Builder is the design tool, served under /builder/.
      - name: Build builder (/builder/)
        env:
          BASE_PATH: /builder/
        run: pnpm --filter @ui-organized/builder exec vite build

      # Storybook is the white-labeled component explorer, served under
      # /storybook/. Its static build uses relative asset paths, so it needs no
      # base-path flag to live under a sub-path. `storybook build` doesn't
      # typecheck, so (like the Vite builds above) pre-existing TS errors don't
      # block the deploy.
      - name: Build Storybook (/storybook/)
        run: pnpm --filter @ui-organized/storybook exec storybook build

      # Assemble one Pages artifact: marketing at root, builder under /builder/,
      # Storybook under /storybook/.
      - name: Assemble site
        run: |
          rm -rf _site
          cp -r apps/marketing/dist/. _site/
          # SPA fallback. The marketing app is a BrowserRouter SPA, so a hard
          # refresh / direct hit on a client route (e.g. /docs) has no matching
          # file on Pages and returns a 404. GitHub Pages serves 404.html for any
          # unknown path; making it a copy of the app shell lets React Router
          # resolve the route client-side. Assets are absolute under BASE_PATH,
          # so they load regardless of the requested route's depth.
          cp _site/index.html _site/404.html
          mkdir -p _site/builder
          cp -r apps/builder/dist/. _site/builder/
          mkdir -p _site/storybook
          cp -r apps/storybook/storybook-static/. _site/storybook/

      # Requires Pages to be enabled once in repo Settings → Pages →
      # Source: "GitHub Actions" (the token can't enable it automatically).
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
