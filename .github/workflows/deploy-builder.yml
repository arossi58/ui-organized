name: Deploy Builder to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the builder's workspace dependencies (@ds/react, @ds/tokens, …).
      # `^...` selects dependencies of @ds/builder but not the app itself.
      - name: Build workspace dependencies
        run: pnpm turbo build --filter=@ds/builder^...

      # Run Vite directly rather than the package's `build` script, which also
      # runs `tsc --noEmit`. The app has pre-existing type errors that would
      # block the deploy; Vite's esbuild bundling does not typecheck.
      - name: Build builder app
        env:
          # Pages serves the app from /<repo>/, so Vite needs a matching base.
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm --filter @ds/builder exec vite build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/builder/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
